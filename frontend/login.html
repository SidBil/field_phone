<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FieldPhone - Login / Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <main class="auth-box glass-panel">
      <div class="auth-header">
        <h1>FieldPhone</h1>
        <p>Phonetic fieldwork access</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" required placeholder="name@example.com" />
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••" />
        </div>
        
        <div style="display: flex; gap: 1rem;">
          <button type="button" id="loginBtn" class="btn-primary" style="flex: 1;">Login</button>
          <button type="button" id="signupBtn" class="btn-outline" style="flex: 1;">Sign Up</button>
        </div>

        <div id="loginError" class="error" style="display: none; margin-top: 1.5rem;"></div>
        <div id="loginSuccess" style="display: none; margin-top: 1.5rem; color: var(--success-color); background: rgba(16, 185, 129, 0.1); padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid rgba(16, 185, 129, 0.2);"></div>
      </form>
    </main>
  </div>

  <script type="module">
    import { supabase } from './js/supabase-client.js'
    import { requireAuth } from './js/auth.js'

    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const errorDiv = document.getElementById('loginError')
    const successDiv = document.getElementById('loginSuccess')

    document.getElementById('loginBtn').addEventListener('click', async () => {
      errorDiv.style.display = 'none'
      successDiv.style.display = 'none'
      
      const email = emailInput.value
      const password = passwordInput.value

      const { data, error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) {
        errorDiv.innerText = error.message
        errorDiv.style.display = 'block'
      } else {
        window.location.href = 'index.html'
      }
    })

    document.getElementById('signupBtn').addEventListener('click', async () => {
      errorDiv.style.display = 'none'
      successDiv.style.display = 'none'

      const email = emailInput.value
      const password = passwordInput.value

      const { data, error } = await supabase.auth.signUp({ email, password })
      if (error) {
        errorDiv.innerText = error.message
        errorDiv.style.display = 'block'
      } else {
        successDiv.innerText = 'Registration successful! You can now log in.'
        successDiv.style.display = 'block'
      }
    })
  </script>
</body>
</html>
