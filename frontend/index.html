<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FieldPhone - Search</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>FieldPhone</h1>
    <div class="nav-links">
      <a href="upload.html">Upload Data</a>
      <button onclick="import('./js/auth.js').then(m => m.logout())">Logout</button>
    </div>
  </header>

  <form id="searchForm" class="search-bar">
    <div class="search-inputs">
      <input type="text" id="searchInput" placeholder="e.g. mid vowel followed by nasal, or type IPA directly: ɛhi" autocomplete="off" />
      <button type="submit">Search</button>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="stripToneCheck" />
      <label for="stripToneCheck">Ignore tone marks</label>
    </div>
  </form>

  <div id="errorBox" class="error" style="display: none;"></div>
  <div id="summaryBox" class="summary" style="display: none;"></div>

  <ul id="resultsTable" class="results-table">
    <!-- Results added by search.js -->
  </ul>

  <!-- The script will enforce auth if not on login -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/search.js"></script>
</body>
</html>
